version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: tucasafacil
      POSTGRES_USER: tucasafacil
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tucasafacil
      SPRING_DATASOURCE_USERNAME: tucasafacil
      SPRING_DATASOURCE_PASSWORD: password

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: